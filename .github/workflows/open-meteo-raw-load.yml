name: Open-Meteo raw load

on:
  workflow_dispatch:
  schedule:
    - cron: "20 6 * * *"
  push:
    branches:
      - open-meteo-extraction-load
    paths:
      - ".github/workflows/open-meteo-raw-load.yml"
      - "scripts/extract_open_meteo.py"
      - "scripts/load_raw_to_motherduck.py"
      - "scripts/bootstrap_motherduck.py"
      - "sql/init_motherduck.sql"
      - "requirements.txt"
      - "dbt_project.yml"
      - "profiles.yml"
      - "models/**"
      - "macros/**"

jobs:
  extract-and-load:
    runs-on: ubuntu-latest
    env:
      MOTHERDUCK_DATABASE: open_meteo_europe_sa
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check required secret
        run: |
          if [ -z "$MOTHERDUCK_TOKEN" ]; then
            echo "Repository secret MOTHERDUCK_TOKEN is not set."
            exit 1
          fi

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Extract Open-Meteo data
        run: |
          python scripts/extract_open_meteo.py \
            --cities Amsterdam Athens Barcelona Berlin Copenhagen Lisbon London Madrid Paris Rome Stockholm Warsaw \
            --output-dir data/raw \
            --past-days 92 \
            --forecast-days 7 \
            --pause-seconds 0.5

      - name: Load raw data to MotherDuck
        run: python scripts/load_raw_to_motherduck.py --input-dir data/raw
        
      - name: Install dbt packages
        run: dbt deps --profiles-dir .

      - name: Check dbt connection
        run: dbt debug --profiles-dir .

      - name: Parse dbt project
        run: dbt parse --profiles-dir .

      - name: Build dbt models
        run: dbt build --profiles-dir .
